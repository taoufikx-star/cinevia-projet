<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia - Votre guide cinéma</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome pour les icônes de cœur -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Barre de Navigation -->
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo" onclick="navigateTo('home')">Cinévia</h1>
                <ul class="nav-links">
                    <li><a href="#" id="link-home" class="active" onclick="navigateTo('home')">Accueil</a></li>
                    <li><a href="#" id="link-favorites" onclick="navigateTo('favorites')">Favoris</a></li>
                </ul>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Rechercher un film...">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- Filtres par catégorie (uniquement sur Accueil) -->
        <div id="category-filters" class="filters-container">
            <!-- Injecté par JS -->
        </div>

        <h2 id="page-title">Tous les films</h2>

        <!-- Grille de films -->
        <div id="movies-grid" class="movies-grid">
            <!-- Injecté par JS -->
        </div>
    </main>

    <!-- Modale de détails -->
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-body">
                <!-- Injecté par JS -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Cinévia - Tous droits réservés.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
