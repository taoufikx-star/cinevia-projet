<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cinévia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Cinévia</h1>
    <input type="text" placeholder="Rechercher..." oninput="rechercher(this.value)">
  </header>
  <div class="filters">
    <button onclick="afficherFilms(films)">Tous</button>
    <button onclick="filtrer('Action')">Action</button>
    <button onclick="filtrer('Comédie')">Comédie</button>
    <button onclick="filtrer('Drame')">Drame</button>
  </div>
  <h2>Favoris</h2>
  <div id="favoris-container" class="grid"></div>
  <div id="modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title"></h2>
      <img id="modal-img" />
      <p id="modal-desc"></p>
      <button id="fav-btn"></button>
      <button onclick="fermerModal()">Fermer</button>
    </div>
  </div>
  <script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
