<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma ToDo List</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>

    <div class="app">
        <h1>📝 Mes Tâches</h1>
        
        <div class="ajout">
            <input type="text" id="saisie" placeholder="Nouvelle tâche...">
            <button onclick="ajouter()">Ajouter</button>
        </div>

        <ul id="liste">
            <!-- Les tâches apparaissent ici -->
        </ul>

        <p class="info">Clique sur une tâche pour la barrer ❌ pour la supprimer</p>
    </div>

    <script src="todo.js"></script>
</body>
</html>
