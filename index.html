<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia - Votre Cinéma Interactif</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome pour les icônes (Etoiles, Recherche) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Barre de Navigation -->
    <header>
        <nav class="navbar">
            <div class="logo" onclick="afficherPage('accueil')">
                <i class="fas fa-video"></i> Cinévia
            </div>
            <ul class="nav-links">
                <li><a href="#" onclick="afficherPage('accueil')">Accueil</a></li>
                <li><a href="#movie-grid">Films</a></li>
                <li><a href="#" onclick="afficherPage('favoris')">Favoris</a></li>
            </ul>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Rechercher..." oninput="rechercherFilm()">
            </div>
        </nav>
    </header>

    <!-- Section Filtres -->
    <div id="hero-section">
        <div class="hero">
            <h1>Découvrez les meilleurs films 🎥</h1>
            <p>Explorez, recherchez et ajoutez vos films préférés</p>
            <a href="#movie-grid" class="btn-explorer">Explorer maintenant</a>
        </div>
    </div>

    <div id="filter-container" class="filters">
        <button class="filter-btn active" onclick="filtrerParCategorie('Tous', this)">Tous</button>
        <button class="filter-btn" onclick="filtrerParCategorie('Action', this)">Action</button>
        <button class="filter-btn" onclick="filtrerParCategorie('Comédie', this)">Comédie</button>
        <button class="filter-btn" onclick="filtrerParCategorie('Drame', this)">Drame</button>
    </div>

    <main class="container">
        <h2 id="page-title" class="section-title">Films populaires</h2>
        <!-- Grille de films dynamique -->
        <div id="movie-grid" class="movie-grid">
            <!-- Injecté par JavaScript -->
        </div>

        <h2 id="favoris-title" class="section-title" style="display: none;">Mes Favoris ❤️</h2>
    </main>

    <!-- Modale de Détails -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fermerModale()">&times;</span>
            <div id="modal-details" class="modal-body">
                <!-- Détails injectés par JavaScript -->
            </div>
        </div>
    </div>

    <!-- Pied de page -->
    <footer>
        <p>&copy; 2024 Cinevia - Tous droits réservés</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
