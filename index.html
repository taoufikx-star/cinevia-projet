<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia - Simplon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">CINÉVIA</div>
        <div class="menu">
            <button onclick="showPage('home')">Accueil</button>
            <button onclick="showPage('favs')">Favoris</button>
        </div>
        <input type="text" id="search" placeholder="Chercher un film..." oninput="searchMovie()">
    </nav>

    <main>
        <div id="home-page">
            <div class="filters">
                <button onclick="filterCat('Tous')">Tous</button>
                <button onclick="filterCat('Action')">Action</button>
                <button onclick="filterCat('Drame')">Drame</button>
                <button onclick="filterCat('Animation')">Animation</button>
            </div>
            <div id="grid" class="movie-grid"></div>
        </div>

        <div id="fav-page" class="hidden">
            <h2 style="text-align:center; margin-top:20px;">Mes Favoris</h2>
            <div id="fav-grid" class="movie-grid"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cinévia - Projet Simplon</p>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-box">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="m-img" src="" alt="" referrerpolicy="no-referrer">
            <h2 id="m-title"></h2>
            <p id="m-desc"></p>
            <button id="m-btn" onclick="toggleFav()">Ajouter aux favoris</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
